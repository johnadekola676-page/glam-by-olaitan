<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B4A2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C08B7A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8705E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
        <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Rose Gold Circle Background -->
  <circle cx="32" cy="32" r="30" fill="url(#grad)" />
  
  <!-- "G" Monogram -->
  <text x="32" y="45" font-family="'Times New Roman', serif" font-size="38" font-weight="bold" fill="#FFF5F3" text-anchor="middle" filter="url(#shadow)">G</text>
  
  <!-- Gold Sparkle Accent -->
  <path d="M49 14 L51 19 L56 21 L51 23 L49 28 L47 23 L42 21 L47 19 Z" fill="#FFF0C0" filter="url(#shadow)"/>
